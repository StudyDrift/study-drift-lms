# Deploy Demo: provision/update the DigitalOcean droplet with Terraform, sync this repo,
# run docker-compose.deploy.yml on the droplet, then verify /health.
#
# Required repository secrets:
#   DIGITALOCEAN_TOKEN   — DigitalOcean API token (write)
#   TF_TOKEN             — HCP Terraform / Terraform Cloud API token (non-interactive auth).
#                          Also set as TF_TOKEN_app_terraform_io so the CLI finds it for app.terraform.io.
#   TF_CLOUD_ORGANIZATION — HCP Terraform organization name (replaces `organization` in the cloud block)
#   DEMO_POSTGRES_PASSWORD — Postgres password for the deploy stack (must be non-empty; the official
#                            postgres image exits with code 1 if POSTGRES_PASSWORD is empty)
#   DEMO_JWT_SECRET      — JWT signing secret for the API
#   OPEN_ROUTER_API_KEY  — OpenRouter API key (written to the droplet as OPENROUTER_API_KEY)
#   DEMO_PUBLIC_ORIGIN (optional) — public browser origin for VITE_API_URL (default https://demo.lextures.com)
#
# Terraform state lives in HCP Terraform (workspace `lextures-demo` in iac/demo/versions.tf).
# SSH keys are generated in Terraform (tls_private_key); the workflow reads the private key from
# terraform output after apply. Remove any legacy workspace Terraform variable ssh_public_key in TFC.

name: Deploy Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-demo
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: "false"
  # HCP Terraform: hostname-specific token is what `terraform init` uses for app.terraform.io.
  TF_TOKEN: ${{ secrets.TF_TOKEN }}
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN }}
  TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}

jobs:
  deploy:
    name: Deploy Demo
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform init
        working-directory: iac/demo
        run: terraform init

      - name: Terraform apply
        working-directory: iac/demo
        run: terraform apply -auto-approve

      - name: Terraform output (droplet IP)
        id: droplet
        working-directory: iac/demo
        run: echo "ip=$(terraform output -raw reserved_ipv4)" >> "$GITHUB_OUTPUT"

      - name: Write SSH private key from Terraform output
        working-directory: iac/demo
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          terraform output -raw ssh_private_key_openssh > ~/.ssh/demo_ed25519
          chmod 600 ~/.ssh/demo_ed25519
          test -s ~/.ssh/demo_ed25519
          head -1 ~/.ssh/demo_ed25519 | grep -q '^-----BEGIN OPENSSH PRIVATE KEY-----'

      - name: Wait for SSH and Docker
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/demo_ed25519"
          SSH_BASE=(
            ssh
            -i "$KEY"
            -o ConnectTimeout=25
            -o ConnectionAttempts=3
            -o StrictHostKeyChecking=accept-new
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
          )

          # DigitalOcean Ubuntu images accept this key for root when ssh_keys are set on the droplet.
          SSH_USER=root

          echo "Waiting for TCP 22 on ${DROPLET_IP}..."
          for i in $(seq 1 90); do
            if timeout 5 bash -c "echo >/dev/tcp/${DROPLET_IP}/22" 2>/dev/null; then
              echo "Port 22 is open."
              break
            fi
            echo "  ... port 22 not open yet ($i/90)"
            sleep 5
          done
          timeout 5 bash -c "echo >/dev/tcp/${DROPLET_IP}/22" 2>/dev/null || { echo "Timed out waiting for port 22."; exit 1; }

          echo "Waiting for SSH (${SSH_USER}@${DROPLET_IP})..."
          for i in $(seq 1 60); do
            if "${SSH_BASE[@]}" "${SSH_USER}@${DROPLET_IP}" "echo ssh_ok" 2>/dev/null; then
              echo "SSH authentication OK."
              break
            fi
            echo "  ... SSH not ready yet ($i/60)"
            sleep 5
          done
          if ! "${SSH_BASE[@]}" "${SSH_USER}@${DROPLET_IP}" "echo ssh_ok" 2>/dev/null; then
            echo "SSH never succeeded. Last lines of ssh -v (look for Permission denied / timeout):"
            ssh -v -i "$KEY" \
              -o ConnectTimeout=25 \
              -o StrictHostKeyChecking=accept-new \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              "${SSH_USER}@${DROPLET_IP}" "true" 2>&1 | tail -40 || true
            exit 1
          fi

          # docker --version only checks the client; docker compose needs the daemon (docker.sock).
          echo "Waiting for Docker daemon (docker info)..."
          for i in $(seq 1 80); do
            if "${SSH_BASE[@]}" "${SSH_USER}@${DROPLET_IP}" "systemctl start docker 2>/dev/null; docker info >/dev/null 2>&1" 2>/dev/null; then
              echo "Docker daemon is up."
              exit 0
            fi
            echo "  ... Docker daemon not ready yet ($i/80) - cloud-init may still be installing"
            if [ "$((i % 10))" -eq 0 ]; then
              "${SSH_BASE[@]}" "${SSH_USER}@${DROPLET_IP}" "echo -n '  [hint] cloud-init: '; cloud-init status 2>/dev/null | head -1; command -v docker >/dev/null && echo '  [hint] docker CLI: installed' || echo '  [hint] docker CLI: not yet (get.docker.com not run)'" 2>/dev/null || true
            fi
            sleep 15
          done

          echo "Timed out waiting for Docker. Remote diagnostics:"
          "${SSH_BASE[@]}" "${SSH_USER}@${DROPLET_IP}" "systemctl status docker --no-pager 2>/dev/null || true; ls -la /var/run/docker.sock 2>/dev/null || true; cloud-init status 2>/dev/null || true; command -v docker || true; tail -80 /var/log/cloud-init-output.log 2>/dev/null || true" 2>&1 || true
          exit 1

      - name: Rsync repository to droplet
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          rsync -az \
            --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'target' \
            --exclude 'dist' \
            --exclude '.terraform' \
            --exclude 'terraform.tfstate' \
            --exclude '.cursor' \
            --exclude 'coverage' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i $HOME/.ssh/demo_ed25519 -o StrictHostKeyChecking=accept-new" \
            ./ "root@${DROPLET_IP}:/opt/lextures/"

      - name: Write .env on droplet
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
          DEMO_POSTGRES_PASSWORD: ${{ secrets.DEMO_POSTGRES_PASSWORD }}
          DEMO_JWT_SECRET: ${{ secrets.DEMO_JWT_SECRET }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
        run: |
          set -euo pipefail
          # postgres:16-alpine refuses to start with an empty POSTGRES_PASSWORD (container exits 1).
          if [ -z "${DEMO_POSTGRES_PASSWORD}" ]; then
            echo "::error::GitHub secret DEMO_POSTGRES_PASSWORD is empty or unset. Set it in repo Settings → Secrets."
            exit 1
          fi
          if [ -z "${DEMO_JWT_SECRET}" ]; then
            echo "::error::GitHub secret DEMO_JWT_SECRET is empty or unset."
            exit 1
          fi
          tmp="$(mktemp)"
          export TMP_ENV="$tmp"
          # Quote .env values when needed (# and spaces break naive echo).
          python3 << 'PY'
          import os
          import re
          import sys

          def line(key: str, value: str) -> str:
              if value == "":
                  return f"{key}=\n"
              if re.search(r"[\r\n]", value):
                  print("Multi-line secrets are not supported.", file=sys.stderr)
                  sys.exit(1)
              if re.search(r'[\s#"\\]', value) or value.startswith("'"):
                  esc = value.replace("\\", "\\\\").replace('"', '\\"')
                  return f'{key}="{esc}"\n'
              return f"{key}={value}\n"

          drop_ip = os.environ["DROPLET_IP"]
          path = os.environ["TMP_ENV"]
          # Browser origin must be HTTPS when using Cloudflare; same-origin API calls.
          public_origin = os.environ.get("DEMO_PUBLIC_ORIGIN") or "https://demo.lextures.com"
          with open(path, "w", encoding="utf-8") as f:
              f.write(line("POSTGRES_PASSWORD", os.environ["DEMO_POSTGRES_PASSWORD"]))
              f.write(line("JWT_SECRET", os.environ["DEMO_JWT_SECRET"]))
              f.write(line("VITE_API_URL", public_origin))
              f.write(line("OPENROUTER_API_KEY", os.environ.get("OPEN_ROUTER_API_KEY", "")))
          PY
          scp -i ~/.ssh/demo_ed25519 -o StrictHostKeyChecking=accept-new \
            "$tmp" "root@${DROPLET_IP}:/opt/lextures/.env"
          shred -u "$tmp" 2>/dev/null || rm -f "$tmp"

      - name: Build and start stack
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          ssh -i ~/.ssh/demo_ed25519 -o StrictHostKeyChecking=accept-new \
            "root@${DROPLET_IP}" \
            "systemctl start docker && docker info >/dev/null && cd /opt/lextures && docker compose -f docker-compose.deploy.yml --env-file .env up -d --build"

      - name: Wait for /health
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          for i in $(seq 1 60); do
            if curl -fsS --max-time 15 "http://${DROPLET_IP}/health" >/dev/null \
              && curl -fsS --max-time 15 -k "https://${DROPLET_IP}/health" >/dev/null; then
              echo "Application health check passed (HTTP and HTTPS)."
              exit 0
            fi
            echo "Waiting for HTTP+HTTPS /health (attempt $i)..."
            sleep 10
          done
          echo "Health check failed after timeout."
          exit 1
