# CI: Rust + web lint/test/build, Docker image build (validates deploy compose).
# IaC: Terraform Cloud remote state; plan on PR, apply on main / workflow_dispatch.
# Deploy: build images with production VITE_API_URL, push to GHCR; Droplet runs cloud-init + Watchtower
# (no SSH/rsync from CI). Repository needs packages: write (GITHUB_TOKEN).
#
# GitHub secrets (repository):
#   TF_TOKEN                    — Terraform Cloud API token (https://app.terraform.io/app/settings/tokens)
#   TF_CLOUD_ORGANIZATION       — Terraform Cloud org name (if not set in the cloud block)
#   DIGITALOCEAN_TOKEN          — DigitalOcean API token (https://cloud.digitalocean.com/account/api/tokens)
#                                 Only used if Terraform Cloud workspace execution mode is Local; if Remote,
#                                 also set DIGITALOCEAN_TOKEN as a sensitive variable on the TFC workspace.
#   POSTGRES_PASSWORD           — DB password (TF_VAR for Droplet .env + image build env)
#   JWT_SECRET                  — Server JWT signing secret (TF_VAR for Droplet .env)
#   OPENROUTER_API_KEY          — Optional; omit or leave empty to disable AI features
#
# After the first successful push, open each GHCR package (lextures-server, lextures-web) and set visibility
# to **public** so the Droplet can pull without registry credentials.
#
# Terraform Cloud workspace "lextures-demo": set optional ssh_key_ids (can be []). With remote execution,
# define postgres_password, jwt_secret, openrouter_api_key, ghcr_image_prefix in the workspace or use
# Local execution so GitHub passes TF_VAR_* from secrets.

name: Demo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  TF_IN_AUTOMATION: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Rust clippy
        working-directory: server
        run: cargo clippy

      - name: Rust test
        working-directory: server
        run: cargo test

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Web install
        working-directory: clients/web
        run: npm ci

      - name: Web lint
        working-directory: clients/web
        run: npm run lint

      - name: Web test
        working-directory: clients/web
        run: npm run test

      - name: Web build
        working-directory: clients/web
        run: npm run build

      - name: Docker package (validate compose build)
        env:
          VITE_API_URL: http://127.0.0.1:8080
          POSTGRES_PASSWORD: ci-local-only
          JWT_SECRET: ci-local-only-not-for-production
        run: docker compose -p lextures -f docker-compose.deploy.yml build

  terraform:
    name: Terraform
    needs: ci
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      droplet_ip: ${{ steps.droplet.outputs.droplet_ip }}
      ghcr_prefix: ${{ steps.ghcr_export.outputs.ghcr_prefix }}
    env:
      TF_TOKEN: ${{ secrets.TF_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
    defaults:
      run:
        working-directory: iac/demo

    steps:
      - uses: actions/checkout@v4

      - name: GHCR image prefix for Terraform
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "TF_VAR_ghcr_image_prefix=ghcr.io/${OWNER}" >> "$GITHUB_ENV"

      - name: Export GHCR prefix for later jobs
        id: ghcr_export
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_prefix=ghcr.io/${OWNER}" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          # Writes ~/.terraform.d/credentials.tfrc.json so `terraform init` can authenticate to HCP Terraform.
          # TF_TOKEN alone is not always sufficient for the cloud backend in CI.
          cli_config_credentials_token: ${{ secrets.TF_TOKEN }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -input=false

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: terraform apply -auto-approve -input=false

      - name: Export droplet IP
        id: droplet
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "droplet_ip=$(terraform output -raw ipv4_address)" >> "$GITHUB_OUTPUT"
          else
            echo "droplet_ip=" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Push images to GHCR
    needs: [ci, terraform]
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.terraform.outputs.droplet_ip != ''
    runs-on: ubuntu-latest
    env:
      DROPLET_IP: ${{ needs.terraform.outputs.droplet_ip }}
      GHCR_PREFIX: ${{ needs.terraform.outputs.ghcr_prefix }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        env:
          VITE_API_URL: http://${{ needs.terraform.outputs.droplet_ip }}:8080
        run: |
          set -euo pipefail
          docker compose -p lextures -f docker-compose.deploy.yml build
          docker tag lextures-server "${GHCR_PREFIX}/lextures-server:latest"
          docker tag lextures-web "${GHCR_PREFIX}/lextures-web:latest"
          docker push "${GHCR_PREFIX}/lextures-server:latest"
          docker push "${GHCR_PREFIX}/lextures-web:latest"
