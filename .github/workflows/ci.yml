# Run tests, lint, and builds for the Rust API and browser clients on pull requests targeting main.
# Does not run on direct pushes to main (see deploy-demo.yml for that path).

name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/studydrift_test
      JWT_SECRET: ci-test-jwt-secret
      RUN_MIGRATIONS: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: studydrift_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d studydrift_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Line coverage (library sources)
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --fail-under-lines 59 \
            --ignore-filename-regex '(^|/)main\.rs$|services/course_structure_ai\.rs$'

      - name: Build
        run: cargo build --release

  clients:
    name: Client (${{ matrix.client }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: [web]
    defaults:
      run:
        working-directory: clients/${{ matrix.client }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/${{ matrix.client }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
