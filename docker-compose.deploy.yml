# Minimal stack for a single droplet: Postgres and API are co-located (no external DB).
# nginx publishes 80 (HTTP) and 443 (HTTPS for Cloudflare Full); API and DB stay on the Docker network.
#   docker compose -f docker-compose.deploy.yml --env-file .env up -d --build
#   VITE_API_URL should match the public origin (e.g. https://demo.lextures.com behind Cloudflare).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studydrift
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: studydrift
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studydrift -d studydrift"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://studydrift:${POSTGRES_PASSWORD}@postgres:5432/studydrift?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      RUN_MIGRATIONS: "true"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./clients/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
