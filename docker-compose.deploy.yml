# Minimal stack for a single droplet: Postgres and API are co-located (no external DB).
# nginx publishes 80 (HTTP) and 443 (HTTPS for Cloudflare Full); API and DB stay on the Docker network.
#   Put LEXTURES_SERVER_IMAGE and LEXTURES_WEB_IMAGE in .env (CI does this) or export them before `up`.
#   docker compose -f docker-compose.deploy.yml --env-file .env up -d
#   VITE_API_URL should match the public origin (e.g. https://demo.lextures.com behind Cloudflare).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studydrift
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: studydrift
    volumes:
      # Host path is created by demo cloud-init on the attached DO block volume (/mnt/lextures-db).
      - /mnt/lextures-db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studydrift -d studydrift"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ${LEXTURES_SERVER_IMAGE:?LEXTURES_SERVER_IMAGE is required}
    restart: unless-stopped
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://studydrift:${POSTGRES_PASSWORD}@postgres:5432/studydrift?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      RUN_MIGRATIONS: "true"
      # Set only if `_sqlx_migrations` lists a version not in this image (sqlx "missing in resolved migrations").
      # Prefer: DELETE that row after verifying schema, or redeploy an image built from current main.
      SQLX_MIGRATIONS_IGNORE_MISSING: ${SQLX_MIGRATIONS_IGNORE_MISSING:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Image runs as USER nobody; use absolute path for curl.
      test: ["CMD", "/usr/bin/curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s

  web:
    image: ${LEXTURES_WEB_IMAGE:?LEXTURES_WEB_IMAGE is required}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    ports:
      - "80:80"
      - "443:443"
