# Local development: API (Go) + Postgres. Use from the repo root or this directory.
#   docker compose -f server/docker-compose.yml up --build
# Or from server/:
#   docker compose up --build
#
# Migrations live in ./migrations in this module.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studydrift
      POSTGRES_PASSWORD: studydrift
      POSTGRES_DB: studydrift
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studydrift -d studydrift"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://studydrift:studydrift@postgres:5432/studydrift?sslmode=disable
      JWT_SECRET: local-dev-jwt-secret-at-least-32-characters-long-ok
      RUN_MIGRATIONS: "true"
      PORT: "8080"
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
